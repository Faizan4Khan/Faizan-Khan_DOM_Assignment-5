<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" async></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Task 1: Button Click Event -->
    <button id="ClickBtn" class="button" >Click Me</button>


    <!--  Task 2: Change Text on Click -->
    <button id="ChangeTextBtn" class="button">Change Text</button>
    <p id="textPara">Lorem ipsum dolor sit amet.</p>    


    <!-- Task 3: Background Color Change -->
    <button id="bgBtn" class="button">Change Background</button>


    <!-- Task 4: Input Event (Live Typing) -->
    <input type="text" id="inputField" placeholder="Type something...">
    <p id="displayText"></p>


    <!-- Task 5: Mouse Events -->
    <div id="box"></div>

   <!-- Task 6: Double Click Event -->
    <button id="doubleClickBtn" class="button">Double Click Me</button>
</body>
</html>
